<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f27a3d">
  <title>今天玩什么 | 摸鱼划水吧</title>
  <link rel="stylesheet" href="./styles.css?v=20260611e">
</head>
<body>
  <div class="site-shell">
    <header class="store-hero" id="top">
      <img id="heroImage" src="./assets/store-hall.png" alt="摸鱼划水吧大厅">
      <div class="hero-shade"></div>
      <div class="hero-content">
        <p class="eyebrow">摸鱼划水吧</p>
        <h1>今天玩什么</h1>
        <p>按人数、桌游和设备快速选，不用研究半天。</p>
        <div class="hero-badges" aria-label="店内玩法">
          <span>桌游库</span>
          <span>包间主机</span>
          <span>到店扫码即用</span>
        </div>
      </div>
    </header>

    <section class="hero-quicknav" id="heroQuicknav" aria-label="快速入口">
      <button type="button" class="quicknav-card" data-view-jump="people">
        <span class="quicknav-icon" aria-hidden="true">👥</span>
        <span class="quicknav-copy">
          <strong>按人数选</strong>
          <small>先看现在几个人最合适</small>
        </span>
      </button>
      <button type="button" class="quicknav-card" data-view-jump="boardgames">
        <span class="quicknav-icon" aria-hidden="true">🎲</span>
        <span class="quicknav-copy">
          <strong>桌游库</strong>
          <small>直接找适合的新手和热场局</small>
        </span>
      </button>
      <button type="button" class="quicknav-card" data-view-jump="devices">
        <span class="quicknav-icon" aria-hidden="true">🕹️</span>
        <span class="quicknav-copy">
          <strong>设备帮助</strong>
          <small>PS5、Switch、电视一页看完</small>
        </span>
      </button>
      <button type="button" class="quicknav-card" data-view-jump="recommend">
        <span class="quicknav-icon" aria-hidden="true">⭐</span>
        <span class="quicknav-copy">
          <strong>今日推荐</strong>
          <small>小说、桌游、主机一起看</small>
        </span>
      </button>
    </section>

    <div class="hero-note" aria-label="到店提示">
      <strong>到店提示</strong>
      <p>先按人数选，不会开设备就看设备帮助；买票、预约、充值和买单继续用小程序。</p>
    </div>

    <main>

      <section class="section" id="people" data-view="people">
        <div class="section-head">
          <p class="eyebrow">按人数选</p>
          <h2>几个人来，玩什么？</h2>
        </div>

        <div class="people-tabs" id="peopleTabs" aria-label="选择人数"></div>

        <article class="people-result" id="peopleResult" aria-live="polite">
          <div class="people-result-head">
            <span class="people-icon" id="peopleIcon">👫</span>
            <div>
              <p class="eyebrow">人数推荐</p>
              <h3 id="peopleTitle">2个人</h3>
            </div>
          </div>
          <p id="peopleText"></p>
          <div class="tag-line" id="peopleTags"></div>
          <div class="people-rec-list" id="peopleRecs"></div>
          <div class="people-rec-actions" id="peopleRecActions"></div>
        </article>
      </section>

      <section class="section" id="boardgames" data-view="boardgames">
        <div class="section-head">
          <p class="eyebrow">店内桌游库</p>
          <h2>桌游库</h2>
        </div>

        <div class="boardgame-toolbar">
          <div class="boardgame-filters" id="boardgameFilters" aria-label="筛选桌游"></div>
          <p class="boardgame-count" id="boardgameCount">0 款</p>
        </div>

        <div class="boardgame-list" id="boardgameList"></div>
      </section>

      <section class="section" id="devices" data-view="devices">
        <div class="section-head">
          <p class="eyebrow">包间通用</p>
          <h2>设备帮助</h2>
        </div>

        <div class="device-tabs" id="deviceTabs" aria-label="设备教程分类"></div>
        <article class="device-panel">
          <div class="device-panel-head">
            <span class="device-mark" id="deviceIcon">⚡</span>
            <div>
              <p class="eyebrow" id="deviceSub">先试这三步</p>
              <h3 id="deviceTitle">快速排查</h3>
            </div>
          </div>
          <ol class="step-list" id="deviceSteps"></ol>
          <div class="device-extra" id="deviceExtra"></div>
          <div class="device-tip" id="deviceTip"></div>
        </article>
      </section>

      <section class="section" id="recommend" data-view="recommend">
        <div class="section-head">
          <p class="eyebrow">今日推荐</p>
          <h2>小说、桌游和游戏</h2>
        </div>

        <div class="recommend-grid" id="recommendGrid"></div>
      </section>

    </main>

    <nav class="bottom-nav" id="viewNav" aria-label="页面切换">
      <button type="button" data-view="people"><span aria-hidden="true">👥</span><span>人数</span></button>
      <button type="button" data-view="boardgames"><span aria-hidden="true">🎲</span><span>桌游库</span></button>
      <button type="button" data-view="devices"><span aria-hidden="true">🔧</span><span>设备</span></button>
      <button type="button" data-view="recommend"><span aria-hidden="true">⭐</span><span>推荐</span></button>
    </nav>
  </div>

  <script src="./site-config.js?v=20260611e"></script>
  <script src="./app.js?v=20260611e"></script>
</body>
</html>
